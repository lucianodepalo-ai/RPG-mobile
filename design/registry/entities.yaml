# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: display_value
    status: active
    source: design/gdd/data-driven-config.md
    referenced_by:
      - design/gdd/data-driven-config.md
    variables:
      - stored_int
    output_range: [-1000.0, 1000.0]
    expression: "stored_int / 1000.0"
    notes: "UI-only float conversion of per-mille fixed-point integers. Combat/sim path must NEVER apply this conversion — only display layer (HUD, menus, replay viewer). Enforces cross-platform determinism."
    added: 2026-04-13
    revised: ""

  - name: boot_hash
    status: active
    source: design/gdd/data-driven-config.md
    referenced_by:
      - design/gdd/data-driven-config.md
    variables:
      - boot_resource_paths
      - boot_resource_content_hashes
    output_range: [0, 0]  # 64-char hex string, not numeric
    expression: "SHA256(concat(sorted(boot_resource_paths) || sorted(boot_resource_content_hashes)))"
    notes: "Anti-cheat session integrity hash. Server-expected vs client-reported mismatch flags session for review. Sorted ordering + content hashing guarantees iOS/Android/Web produce identical hashes for identical Resources."
    added: 2026-04-13
    revised: ""

  # ── Material System formulas (4) ──
  - name: weighted_material_drop
    status: active
    source: design/gdd/material-system.md
    referenced_by:
      - design/gdd/material-system.md
    variables:
      - entries
      - total_weight
      - random_int
      - cumulative_weights
    output_range: [0, 49]  # drop_index into LootTable entries array
    expression: "drop_index = find_in_cumulative(random_int(0, total_weight - 1), cumulative_weights)"
    notes: "Standard weighted-random drop resolution. RNG deterministic per combat_session_id for cross-platform consistency. Integer-only path."
    added: 2026-04-21
    revised: ""

  - name: idle_material_award
    status: active
    source: design/gdd/material-system.md
    referenced_by:
      - design/gdd/material-system.md
    variables:
      - elapsed_seconds
      - idle_rate_seconds_per_unit
      - idle_max_offline_units
    output_range: [0, 168]  # 0 to max units (default 32, max safe 168)
    expression: "units_awarded = min(floor(elapsed_seconds / idle_rate_seconds_per_unit), idle_max_offline_units)"
    notes: "Offline material generation. 8-hour cap prevents AFK exploitation. elapsed_seconds clamped to 30 days upstream (by Idle GDD). Owner: Idle/Offline Progression GDD (Tier 2) for elapsed_seconds; MaterialSystem owns the cap and award logic."
    added: 2026-04-21
    revised: ""

  - name: material_overflow_gold_conversion
    status: active
    source: design/gdd/material-system.md
    referenced_by:
      - design/gdd/material-system.md
    variables:
      - overflow_units
      - tier
      - overflow_rate_for_tier
    output_range: [0, 499500]  # theoretical max; normal play ~0-500 gold
    expression: "gold_awarded = overflow_units × overflow_rate_for_tier[tier]"
    notes: "Converts material overflow above 999 stack cap to gold. Rates (2/8/35/150/500 per tier) deliberately BELOW material's crafting value to nudge consumption over hoarding. Must stay coordinated with Economy GDD cost curves — if rates exceed crafting yield, players hoard for gold not craft."
    added: 2026-04-21
    revised: ""

  - name: expected_material_drops_per_session
    status: active
    source: design/gdd/material-system.md
    referenced_by:
      - design/gdd/material-system.md
    variables:
      - encounters_per_session
      - drop_rate_per_tier
    output_range: [0.0, 10.0]  # float; analytics only
    expression: "ed[T] = encounters_per_session × drop_rate_per_tier[T] / 1000"
    notes: "ANALYTICS-ONLY formula. Validates session-level drop distribution targets. Float output is acceptable because this never feeds combat; used in dashboards only. Target (6 encounters, MVP rates): Common 3.9/session, Uncommon 1.5, Rare 0.48, Epic 0.09."
    added: 2026-04-21
    revised: ""

