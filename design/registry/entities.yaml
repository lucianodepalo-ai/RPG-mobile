  - name: per_mille_scale
    status: active
    source: design/gdd/data-driven-config.md
    referenced_by:
      - design/gdd/data-driven-config.md
    value: 1000
    unit: scale_factor
    notes: "Scale factor used to represent fractional combat-critical values as integers. e.g. stat_scaling=1250 represents 1.25x. ALL combat-critical values use this convention; floats forbidden in combat path."
