# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: display_value
    status: active
    source: design/gdd/data-driven-config.md
    referenced_by:
      - design/gdd/data-driven-config.md
    variables:
      - stored_int
    output_range: [-1000.0, 1000.0]
    expression: "stored_int / 1000.0"
    notes: "UI-only float conversion of per-mille fixed-point integers. Combat/sim path must NEVER apply this conversion — only display layer (HUD, menus, replay viewer). Enforces cross-platform determinism."
    added: 2026-04-13
    revised: ""

  - name: boot_hash
    status: active
    source: design/gdd/data-driven-config.md
    referenced_by:
      - design/gdd/data-driven-config.md
    variables:
      - boot_resource_paths
      - boot_resource_content_hashes
    output_range: [0, 0]  # 64-char hex string, not numeric
    expression: "SHA256(concat(sorted(boot_resource_paths) || sorted(boot_resource_content_hashes)))"
    notes: "Anti-cheat session integrity hash. Server-expected vs client-reported mismatch flags session for review. Sorted ordering + content hashing guarantees iOS/Android/Web produce identical hashes for identical Resources."
    added: 2026-04-13
    revised: ""

  # ── Material System formulas (4) ──
  - name: weighted_material_drop
    status: active
    source: design/gdd/material-system.md
    referenced_by:
      - design/gdd/material-system.md
    variables:
      - entries
      - total_weight
      - random_int
      - cumulative_weights
    output_range: [0, 49]  # drop_index into LootTable entries array
    expression: "drop_index = find_in_cumulative(random_int(0, total_weight - 1), cumulative_weights)"
    notes: "Standard weighted-random drop resolution. RNG deterministic per combat_session_id for cross-platform consistency. Integer-only path."
    added: 2026-04-21
    revised: ""

  - name: idle_material_award
    status: active
    source: design/gdd/material-system.md
    referenced_by:
      - design/gdd/material-system.md
    variables:
      - elapsed_seconds
      - idle_rate_seconds_per_unit
      - idle_max_offline_units
    output_range: [0, 168]  # 0 to max units (default 32, max safe 168)
    expression: "units_awarded = min(floor(elapsed_seconds / idle_rate_seconds_per_unit), idle_max_offline_units)"
    notes: "Offline material generation. 8-hour cap prevents AFK exploitation. elapsed_seconds clamped to 30 days upstream (by Idle GDD). Owner: Idle/Offline Progression GDD (Tier 2) for elapsed_seconds; MaterialSystem owns the cap and award logic."
    added: 2026-04-21
    revised: ""

  - name: material_overflow_gold_conversion
    status: active
    source: design/gdd/material-system.md
    referenced_by:
      - design/gdd/material-system.md
    variables:
      - overflow_units
      - tier
      - overflow_rate_for_tier
    output_range: [0, 499500]  # theoretical max; normal play ~0-500 gold
    expression: "gold_awarded = overflow_units × overflow_rate_for_tier[tier]"
    notes: "Converts material overflow above 999 stack cap to gold. Rates (2/8/35/150/500 per tier) deliberately BELOW material's crafting value to nudge consumption over hoarding. Must stay coordinated with Economy GDD cost curves — if rates exceed crafting yield, players hoard for gold not craft."
    added: 2026-04-21
    revised: ""

  - name: expected_material_drops_per_session
    status: active
    source: design/gdd/material-system.md
    referenced_by:
      - design/gdd/material-system.md
    variables:
      - encounters_per_session
      - drop_rate_per_tier
    output_range: [0.0, 10.0]  # float; analytics only
    expression: "ed[T] = encounters_per_session × drop_rate_per_tier[T] / 1000"
    notes: "ANALYTICS-ONLY formula. Validates session-level drop distribution targets. Float output is acceptable because this never feeds combat; used in dashboards only. Target (6 encounters, MVP rates): Common 3.9/session, Uncommon 1.5, Rare 0.48, Epic 0.09."
    added: 2026-04-21
    revised: ""

  # ── Weapon Entity System formulas (6 total; all integer arithmetic for determinism) ──
  - name: weapon_rarity_gate
    status: active
    source: design/gdd/weapon-entity-system.md
    referenced_by:
      - design/gdd/weapon-entity-system.md
    variables:
      - materials[]  # Array of MaterialDefinition with .tier, .rarity
      - forge_grade  # int [0, 100]
    output_range: [1, 5]
    expression: "Deterministic gate: r=5 if epic_count>=2 AND grade>=85; r=4 if (epic>=1 AND grade>=60) OR (rare_or_higher>=2 AND grade>=75); r=3 if (rare>=1 AND grade>=40) OR (uncommon>=3 AND grade>=60); r=2 if (uncommon>=1 AND grade>=20) OR (common>=3 AND grade>=60); r=1 default"
    notes: "NON-RANDOM. Same inputs -> same rarity. Output frozen at forge to WeaponInstance.rarity. See weapon-entity-system.md section D.1 + G.2 for threshold tuning knobs."
    added: 2026-04-21
    revised: ""

  - name: weapon_grade_bonus_per_mille
    status: active
    source: design/gdd/weapon-entity-system.md
    referenced_by:
      - design/gdd/weapon-entity-system.md
    variables:
      - forge_grade  # int [0, 100]
    output_range: [0, 500]
    expression: "grade_bonus_per_mille = forge_grade * GRADE_BONUS_MULTIPLIER (default 5)"
    notes: "Linear mapping. Range [0, 500 per-mille] = 0% to +50% stat bonus. See weapon-entity-system.md section D.2 + G.3."
    added: 2026-04-21
    revised: ""

  - name: weapon_material_bonus_aggregation
    status: active
    source: design/gdd/weapon-entity-system.md
    referenced_by:
      - design/gdd/weapon-entity-system.md
    variables:
      - materials[]  # with .stat_bonuses[axis], .tier, .damage_type_affinity
      - archetype.damage_type
      - stat_axis  # one of attack/defense/speed/crit/dodge
    output_range: [0, 16000]  # practical bound at 10x T4 compat
    expression: "sum over materials of (stat_bonuses[axis] * count * tier_weight[tier] * compatibility_multiplier) / 1000; tier_weight=[1,2,4,8]; compatibility_multiplier=1000 (match) or 500 (mismatch)"
    notes: "Per stat axis aggregation. Integer-only. Output feeds weapon_stat_final. See weapon-entity-system.md section D.3 + G.4."
    added: 2026-04-21
    revised: ""

  - name: weapon_stat_final
    status: active
    source: design/gdd/weapon-entity-system.md
    referenced_by:
      - design/gdd/weapon-entity-system.md
      - design/gdd/combat-simulation.md  # expected downstream consumer (not yet designed)
    variables:
      - archetype_base  # int
      - material_bonus_aggregate  # per_mille
      - grade_bonus_per_mille  # per_mille
    output_range: [1, 9999]
    expression: "stat_final = clamp(archetype_base + floor(material_bonus_aggregate * archetype_base / 1000) + floor(grade_bonus_per_mille * archetype_base / 1000), 1, 9999)"
    notes: "Frozen at forge to WeaponInstance.*_final fields (attack/defense/speed/crit/dodge). Combat Sim NEVER re-derives. See weapon-entity-system.md section D.4 + G.5."
    added: 2026-04-21
    revised: ""

  - name: weapon_element_dominance
    status: active
    source: design/gdd/weapon-entity-system.md
    referenced_by:
      - design/gdd/weapon-entity-system.md
    variables:
      - materials[]  # with .element StringName + .tier
    output_range: null  # StringName output
    expression: "element_id = argmax over elements E of sum(material.tier for material in materials where material.element == E); tiebreak: first-encountered in input order; fallback &'neutral' if all materials are Neutral"
    notes: "Deterministic. Output is StringName, not numeric. 7 valid values: &'fire', &'water_ice', &'earth', &'wind_storm', &'light', &'dark', &'neutral'. See weapon-entity-system.md section D.5 + G.6."
    added: 2026-04-21
    revised: ""

  - name: weapon_power_rating
    status: active
    source: design/gdd/weapon-entity-system.md
    referenced_by:
      - design/gdd/weapon-entity-system.md
      - design/gdd/matchmaking.md  # owns the weights; not yet designed
    variables:
      - archetype.base_power_rating
      - attack_final
      - defense_final
      - speed_final
      - crit_chance_final  # per_mille
      - dodge_final  # per_mille
      - rarity
      - affix_tiers[]  # Array[int]
    output_range: [300, 15000]  # typical
    expression: "pr = base_power_rating + floor((attack_final + defense_final + speed_final) / POWER_STAT_WEIGHT) + floor(crit_chance_final / POWER_CRIT_DIVISOR) + floor(dodge_final / POWER_DODGE_DIVISOR) + rarity * POWER_RARITY_MULTIPLIER + sum(affix_tier * POWER_AFFIX_TIER_MULTIPLIER); default weights (placeholder): STAT=3, CRIT=5, DODGE=5, RARITY_MULT=50, AFFIX_MULT=30"
    notes: "Weights OWNED by Matchmaking GDD (not yet designed). Frozen at naming; NOT recomputed on patch. NOT visible in HUD/mini-cards (anti-P2W). See weapon-entity-system.md section D.6 + G.7."
    added: 2026-04-21
    revised: ""

