# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  # ── Per-mille fixed-point convention (cross-platform determinism guarantee) ──
  - name: per_mille_scale
    status: active
    source: design/gdd/data-driven-config.md
    referenced_by:
      - design/gdd/data-driven-config.md
    value: 1000
    unit: scale_factor
    notes: "Scale factor used to represent fractional combat-critical values as integers. e.g. stat_scaling=1250 represents 1.25x. ALL combat-critical values use this convention; floats forbidden in combat path."
    added: 2026-04-13
    revised: ""

